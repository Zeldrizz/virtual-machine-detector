name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: https://zeldrizz.github.io/virtual-machine-detector/
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Upload static site
        uses: actions/upload-pages-artifact@v5
        with:
          path: app/public

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
